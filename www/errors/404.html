<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container error-container">
        <div class="error-icon">
            <span class="material-icons" style="font-size: 5em;">error_outline</span>
        </div>
        
        <div class="error-code">404</div>
        
        <div class="error-message">
            Упс! Страница не найдена.
        </div>
        
        <p style="color: white; font-size: 1.1em; margin-bottom: 20px;">
            К сожалению, запрошенный ресурс не существует на этом сервере.
        </p>
        
        <div class="error-buttons">
            <a href="/" class="btn btn-primary">
                <span class="material-icons">home</span>
                На главную
            </a>
            <a href="/settings" class="btn btn-primary">
                <span class="material-icons">settings</span>
                Панель управления
            </a>
        </div>
        
        <div style="margin-top: 60px; color: rgba(255,255,255,0.6); font-size: 0.9em;">
            <p>Если вы считаете, что это ошибка, свяжитесь с администратором сервера.</p>
        </div>
    </div>
</body>
</html>
