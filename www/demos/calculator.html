<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный калькулятор</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧮 Интерактивный калькулятор</h1>
            <p>Быстрые вычисления в браузере</p>
        </div>

        <div class="calculator">
            <div class="display" id="display">0</div>
            
            <div class="button-grid">
                <button class="calc-btn clear" onclick="clearDisplay()">Очистить</button>
                <button class="calc-btn operator" onclick="appendOperator('/')">÷</button>
                <button class="calc-btn operator" onclick="appendOperator('*')">×</button>
                
                <button class="calc-btn number" onclick="appendNumber('7')">7</button>
                <button class="calc-btn number" onclick="appendNumber('8')">8</button>
                <button class="calc-btn number" onclick="appendNumber('9')">9</button>
                <button class="calc-btn operator" onclick="appendOperator('-')">−</button>
                
                <button class="calc-btn number" onclick="appendNumber('4')">4</button>
                <button class="calc-btn number" onclick="appendNumber('5')">5</button>
                <button class="calc-btn number" onclick="appendNumber('6')">6</button>
                <button class="calc-btn operator" onclick="appendOperator('+')">+</button>
                
                <button class="calc-btn number" onclick="appendNumber('1')">1</button>
                <button class="calc-btn number" onclick="appendNumber('2')">2</button>
                <button class="calc-btn number" onclick="appendNumber('3')">3</button>
                <button class="calc-btn operator" onclick="toggleSign()">±</button>
                
                <button class="calc-btn number" style="grid-column: span 2;" onclick="appendNumber('0')">0</button>
                <button class="calc-btn decimal" onclick="appendDecimal()">.</button>
                <button class="calc-btn equals" onclick="calculate()">=</button>
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Операций</div>
                    <div class="stat-value" id="operations-count">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">История</div>
                    <div class="stat-value" id="history-count">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Статус</div>
                    <div class="stat-value" id="status">✓</div>
                </div>
            </div>

            <div class="history">
                <h3>
                    <span class="material-icons">history</span>
                    История вычислений
                </h3>
                <div id="history-list"></div>
            </div>
        </div>
    </div>

    <script src="/js/calculator.js"></script>
</body>
</html>
